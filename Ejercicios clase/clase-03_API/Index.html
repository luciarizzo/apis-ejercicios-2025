<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Usuarios desde API</title>
  <link rel="stylesheet" href="estilos.css">
</head>
<body>
  <h1>Lista de Usuarios</h1>

  <div class="toolbar">
    <button id="btnUsuarios">Traer usuarios</button>
    <span id="estado" class="status"></span>
  </div>

  <table id="tablaUsuarios">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Email</th>
        <th>Ciudad</th>
      </tr>
    </thead>
    <tbody>
      <tr><td class="center" colspan="4">Sin datos todavía</td></tr>
    </tbody>
  </table>

  <script src="app.js"></script>
</body>
</html>
